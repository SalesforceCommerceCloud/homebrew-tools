name: Auto-merge b2c-cli updates

on:
  workflow_run:
    workflows: ["brew test-bot"]
    types:
      - completed

jobs:
  auto-label:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Add pr-pull label to auto-update PRs
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.workflow_run.head_branch;
            console.log(`Workflow run branch: ${branch}`);

            if (!branch || !branch.startsWith('update-b2c-cli-')) {
              console.log('Not an auto-update branch, skipping');
              return;
            }

            // Find the open PR for this branch
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open'
            });

            if (prs.length === 0) {
              console.log(`No open PR found for branch ${branch}`);
              return;
            }

            const pr = prs[0];
            console.log(`Adding pr-pull label to PR #${pr.number}`);
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['pr-pull']
            });
