name: Auto-merge b2c-cli updates

on:
  workflow_run:
    workflows: ["brew test-bot"]
    types:
      - completed

jobs:
  auto-label:
    # Only when test-bot succeeds on a pull request
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Add pr-pull label to auto-update PRs
        uses: actions/github-script@v7
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests;
            if (!prs || prs.length === 0) {
              console.log('No pull requests associated with this workflow run');
              return;
            }

            for (const pr of prs) {
              const { data: fullPR } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number
              });

              if (!fullPR.head.ref.startsWith('update-b2c-cli-')) {
                console.log(`PR #${pr.number} branch "${fullPR.head.ref}" is not an auto-update, skipping`);
                continue;
              }

              console.log(`Adding pr-pull label to PR #${pr.number}`);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['pr-pull']
              });
            }
